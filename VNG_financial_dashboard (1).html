<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financial Performance Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text-secondary:#999;--text-tertiary:#666;
  --accent:#e25a2c;--sidebar-w:200px;--radius:8px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* LOGIN */
#loginPage{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.login-corner{position:absolute;top:20px;right:24px;display:flex;align-items:center;gap:14px;}
.corner-icon{background:none;border:none;color:#555;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.lang-badge{background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;}
.login-box{width:100%;max-width:400px;padding:0 24px;display:flex;flex-direction:column;align-items:center;gap:0;}
.login-logo{width:80px;height:80px;border-radius:12px;overflow:hidden;margin-bottom:20px;background:#fff;padding:6px;}
.login-logo img{width:100%;height:100%;object-fit:cover;}
.login-title{font-size:22px;font-weight:600;text-align:center;margin-bottom:8px;}
.login-sub{font-size:14px;color:#666;text-align:center;margin-bottom:28px;}
.login-label{font-size:13px;color:#888;margin-bottom:6px;align-self:flex-start;width:100%;}
.login-input{width:100%;background:#1c1c1c;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:11px 14px;font-size:14px;color:#fff;outline:none;margin-bottom:14px;font-family:inherit;}
.login-input:focus{border-color:rgba(255,255,255,0.3);}
.login-input::placeholder{color:#444;}
.btn-login{width:100%;background:#f0f0f0;color:#0a0a0a;border:none;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:18px;font-family:inherit;}
.btn-login:hover{background:#fff;}
.login-divider{width:100%;display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.login-divider-line{flex:1;height:0.5px;background:rgba(255,255,255,0.1);}
.login-divider-text{font-size:13px;color:#555;}
.btn-microsoft{width:100%;background:#1c1c1c;color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:12px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;}
.btn-microsoft:hover{background:#252525;border-color:rgba(255,255,255,0.2);}
.ms-logo{width:16px;height:16px;display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.ms-logo span{border-radius:1px;}
.login-version{font-size:12px;color:#444;margin-top:24px;}

/* APP */
#appPage{display:none;height:100vh;flex-direction:column;}
#appPage.visible{display:flex;}

/* VIEWER LAYOUT */
.viewer{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;transition:width 0.22s cubic-bezier(0.4,0,0.2,1),min-width 0.22s;overflow:hidden;}
.sidebar.collapsed{width:0;min-width:0;}
.sidebar-inner{width:var(--sidebar-w);min-width:var(--sidebar-w);display:flex;flex-direction:column;height:100%;overflow:hidden;}

.sidebar-top{padding:14px 14px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-title{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:0.06em;text-transform:uppercase;}
.collapse-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#bbb;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s;}
.collapse-btn:hover{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.35);}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-nav::-webkit-scrollbar{width:3px;}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px;}
.year-group-nav{margin-bottom:4px;}
.year-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:0.04em;}
.year-toggle:hover{color:var(--text);}
.year-toggle i{font-size:13px;transition:transform 0.2s;}
.year-toggle.open i{transform:rotate(180deg);}
.cycle-list{padding:0 8px 4px;}
.cycle-item{padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cycle-item:hover{background:var(--surface2);color:var(--text);}
.cycle-item.active{background:rgba(226,90,44,0.15);color:var(--accent);font-weight:500;}
.cycle-list.hidden{display:none;}

/* EXPAND BTN when sidebar collapsed */
.expand-btn{position:fixed;top:14px;left:14px;z-index:50;width:32px;height:32px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.22);border-radius:8px;cursor:pointer;color:#ccc;display:none;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 10px rgba(0,0,0,.5);transition:all .15s;}
.expand-btn.visible{display:flex;}
.expand-btn:hover{color:#fff;background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.4);}

/* MAIN CONTENT */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SKELETON */
.skeleton-wrap{position:absolute;inset:0;background:var(--bg);z-index:10;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.skeleton-wrap.visible{display:flex;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border-md);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.skeleton-text{font-size:13px;color:var(--text-tertiary);}

/* IFRAME */
#reportFrame{width:100%;height:100%;border:none;display:block;}

/* AI BUTTON */
@keyframes ai-breathe {
  0%,100%{transform:scale(1);box-shadow:0 4px 18px rgba(255,255,255,0.12),0 0 0 0 rgba(255,255,255,0.15);}
  50%{transform:scale(1.06);box-shadow:0 6px 28px rgba(255,255,255,0.22),0 0 0 8px rgba(255,255,255,0.04);}
}
@keyframes ai-breathe-ring {
  0%,100%{opacity:0.35;transform:scale(1);}
  50%{opacity:0;transform:scale(1.55);}
}
.ai-btn-wrap{position:fixed;bottom:24px;right:24px;z-index:50;width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.ai-btn-ring{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.35);animation:ai-breathe-ring 2.8s ease-in-out infinite;pointer-events:none;}
.ai-btn{position:relative;width:52px;height:52px;background:#111;border:2px solid rgba(255,255,255,0.18);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;animation:ai-breathe 2.8s ease-in-out infinite;transition:filter 0.15s;}
.ai-btn:hover{filter:brightness(1.25);}
.ai-btn-oi{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:#fff;border-radius:50%;}
.ai-btn-oi span{font-size:13px;font-weight:800;letter-spacing:-0.5px;color:#111;font-family:'DM Sans',system-ui,sans-serif;line-height:1;user-select:none;}
.ai-tooltip{position:fixed;bottom:82px;right:16px;background:#1c1c1c;border:0.5px solid var(--border-md);border-radius:var(--radius);padding:12px 14px;max-width:260px;font-size:12px;line-height:1.6;color:var(--text-secondary);box-shadow:0 4px 20px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.18s;z-index:51;}
.ai-tooltip.visible{opacity:1;}
.ai-tooltip strong{color:var(--text);display:block;margin-bottom:4px;font-size:13px;}
.ai-tooltip-arrow{position:absolute;bottom:-5px;right:22px;width:10px;height:10px;background:#1c1c1c;border-right:0.5px solid var(--border-md);border-bottom:0.5px solid var(--border-md);transform:rotate(45deg);}
</style>
</head>

// ── LOGIN ──────────────────────────────────────────────────────────────────
function doLogin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').classList.add('visible');
  buildSidebar();
  loadReport(0);
}

document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ── SIDEBAR ────────────────────────────────────────────────────────────────
const REPORTS = [
  { year: 2026, label: 'FC4 + 8 (May 2026)',  b64: null, key: 'fc48' },
  { year: 2026, label: 'FC3 + 9 (Apr 2026)',  b64: null, key: 'orig' },
  { year: 2026, label: 'FC2 + 10 (Mar 2026)', b64: null, key: 'fc48' },
  { year: 2025, label: 'FC4 + 8 (Nov 2025)',  b64: null, key: 'orig' },
  { year: 2025, label: 'FC3 + 9 (Oct 2025)',  b64: null, key: 'fc48' },
  { year: 2025, label: 'FC2 + 10 (Sep 2025)', b64: null, key: 'orig' },
];
let currentReportIdx = 0;

function buildSidebar() {
  // Group by year
  const byYear = {};
  REPORTS.forEach((r, i) => {
    if (!byYear[r.year]) byYear[r.year] = [];
    byYear[r.year].push({ ...r, idx: i });
  });

  let html = '';
  for (const year of Object.keys(byYear).sort().reverse()) {
    html += `<div class="year-group-nav">
      <div class="year-toggle open" onclick="toggleYear(this)">
        <span>${year}</span><i class="ti ti-chevron-down"></i>
      </div>
      <div class="cycle-list">`;
    for (const r of byYear[year]) {
      html += `<div class="cycle-item${r.idx === 0 ? ' active' : ''}" onclick="loadReport(${r.idx}, this)">${r.label}</div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('sidebarNav').innerHTML = html;
}

function toggleYear(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('hidden');
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const exp = document.getElementById('expandBtn');
  sb.classList.toggle('collapsed');
  exp.classList.toggle('visible', sb.classList.contains('collapsed'));
}

function loadReport(idx, itemEl) {
  currentReportIdx = idx;
  // Update active state
  document.querySelectorAll('.cycle-item').forEach(el => el.classList.remove('active'));
  if (itemEl) {
    itemEl.classList.add('active');
  } else {
    // Auto-focus: activate the cycle item matching idx
    const items = document.querySelectorAll('.cycle-item');
    if (items[idx]) items[idx].classList.add('active');
  }

  // Show skeleton
  const sk = document.getElementById('skeletonWrap');
  sk.classList.add('visible');

  setTimeout(() => {
    const b64 = REPORTS[idx].key === 'orig' ? ORIG_B64 : FC48_B64;
    const html = atob(b64);
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const frame = document.getElementById('reportFrame');
    frame.src = url;
    frame.onload = () => {
      sk.classList.remove('visible');
    };
  }, 600);
}

// ── AI BUTTON ──────────────────────────────────────────────────────────────

function hideTooltip() { document.getElementById('aiTooltip').classList.remove('visible'); }
